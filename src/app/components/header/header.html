<mat-toolbar class="!shadow-xl !bg-gray-800 sticky z-3 top-0">
    <div class="flex flex-row item-center justify-between align-center flex-auto">
        <div class="relative top-5 flex flex-row sm:space-x-4">
            <mat-icon class="relative top-1 bg-white">analytics</mat-icon>
            <span class="hidden sm:block text-2xl font-semibold text-white">Kunal Maven Analytics Data Projects</span>
        </div>
        <div class="w-fit sm:w-full flex flex-row items-center justify-end">
            <a matTooltip="Toggle Completed Projects" aria-label="Toggle Completed Projects">
                <mat-slide-toggle [formControl]="toggleAnalysisCompletedFormControl" labelPosition="before"
                    (change)="onToggleCompletionStatus()" />
            </a>
            <div class="relative left-2 top-2 sm:w-4/12">
                <mat-form-field class="w-full">
                    <mat-label>Search Keyword</mat-label>
                    <input [formControl]="queryFormControl" matInput type="text" placeholder="Search Keyword"
                        (input)="onQueryInput()" />
                </mat-form-field>
            </div>
        </div>

    </div>
</mat-toolbar>
