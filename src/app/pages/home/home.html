<app-feature-container>
    <div class="m-4 p-4">
        @if(jupyterAnalysisStore.isLoading()) {
        <div class="flex flex-row items-center justify-center">
            <mat-progress-spinner mode="indeterminate" />
        </div>
        }
        @else {
        <div class="grid grid-cols-1 sm:grid-cols-4 gap-6">
            @for(item of jupyterAnalysisStore.filteredJupyterAnalysisData(); track $index) {
            <div (click)="openAnalysisWindow(item)">
                <app-customcard [item]="item" />
            </div>
            }
        </div>
        }
    </div>

</app-feature-container>
